<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DIASFIT</title>

<link rel="manifest" href="https://diasfit.github.io/diasfit-pwa/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DIASFIT">
<link rel="apple-touch-icon" href="https://static.wixstatic.com/media/43bd9d_e1df573eb22c405ba751b16997cce6b1~mv2.jpg">

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #ededed;
    font-family: 'Lato', -apple-system, sans-serif;
    overflow: hidden;
  }
  .wrap {
    height: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .logo {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #d4c4b4;
    text-shadow: 0 2px 10px rgba(43,43,43,0.20);
    line-height: 1;
    animation: surge 0.5s ease-out;
  }
  .sub {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #2b2b2b;
    margin-top: 14px;
    animation: surge 0.5s ease-out 0.1s both;
  }
  .track {
    width: 180px;
    height: 3px;
    background: rgba(43,43,43,0.10);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 30px;
    animation: surge 0.5s ease-out 0.2s both;
  }
  .fill {
    height: 100%;
    width: 0%;
    background: #d4c4b4;
    border-radius: 2px;
    animation: encher 4s ease-in-out forwards;
  }
  @keyframes encher {
    0%   { width: 0%; }
    70%  { width: 80%; }
    100% { width: 100%; }
  }
  @keyframes surge {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo, .sub, .track { animation: none; }
    .fill { animation: encher 4s linear forwards; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">DIASFIT</div>
    <div class="sub">A carregar</div>
    <div class="track"><div class="fill"></div></div>
  </div>
  <script>
    var emApp = window.navigator.standalone === true ||
                window.matchMedia('(display-mode: standalone)').matches;

    if (emApp) {
      setTimeout(function () {
        window.location.replace('https://www.diasfit.com/o-meu-progresso');
      }, 4000);
    }
  </script>
</body>
</html>
